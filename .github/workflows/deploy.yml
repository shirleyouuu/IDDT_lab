name: CI
on:
  push:
    branches: [ main ]
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        run: |
          git clone --no-local https://github.com/shirleyouuu/IDDT_lab.git .
          git checkout main
      - name: Install and Build
        run: |
          npm install
          npm run build